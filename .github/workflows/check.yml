name: Check e-Gov Updates

permissions:
  contents: write

on:
  schedule:
    - cron: "0 22 * * *"

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run monitor.py
        run: python src/monitor.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add docs/data/
          git diff --cached --quiet || git commit -m "chore: update law data"

      - name: Push changes
        run: git push