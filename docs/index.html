<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eGov Law Monitor</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>eGov Law Monitor</h1>

        <p class="subtitle">
            e-Gov法令更新監視ツール
        </p>

        <div class="card">

            <h2>最新の法令更新情報</h2>

            <p>
                更新日：
                <span id="update-date">-</span>
            </p>

            <p>
                更新件数：
                <span id="update-count">0</span>件
            </p>

            <h3>法令種別</h3>
            <div id="law-type-summary"></div>

            <h3>更新法令一覧</h3>
            <ul id="update-list"></ul>

            <p>
                <a href="updates.html" class="button">

                    詳細一覧を見る

                </a>
            </p>

        </div>

        <section class="card">
            <h2>ツール情報</h2>

            <p>バージョン：<span id="app-version">-</span></p>

            <p>最終更新：<span id="release-date">-</span></p>

            <div class="button-group">
                <a id="repo-link" class="button" href="#" target="_blank">
                    GitHub Repository
                </a>

                <a id="release-link" class="button" href="#" target="_blank">
                    Latest Release
                </a>
            </div>
        </section>

    </div>

    <footer>

        © 2026 eGov Law Monitor

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
